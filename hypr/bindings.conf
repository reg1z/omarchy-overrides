unbind = SUPER, U
unbind = SUPER, $u
bindd = SUPER, U, Scratchpad-2, togglespecialworkspace, Scratchpad-2
#
unbind = SUPER SHIFT CTRL, U
unbind = SUPER SHIFT CTRL, $u
bindd = SUPER SHIFT CTRL, U, Move to Scratchpad-2, movetoworkspace, special:Scratchpad-2

# Scratchpad-3
workspace = special:Scratchpad-3
#
unbind = SUPER, Y
unbind = SUPER, $y
bindd = SUPER, Y, Scratchpad-3, togglespecialworkspace, Scratchpad-3
#
