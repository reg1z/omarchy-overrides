######### Webapps #########
###                     ###

$launch-webapp = firefox --new-window -P Personal
$launch-or-focus-webapp = omarchy-launch-or-focus-webapp

# Claude
$claudeCmd = $launch-webapp "https://claude.ai"
workspace = special:LLM, on-created-empty:$claudeCmd
workspace = special:LLM, layout:master, layoutopt:orientation:center # Master layout by default
#
unbind = SUPER, A
unbind = SUPER, $a
bindd = SUPER, $a, LLM, togglespecialworkspace, LLM

# Perplexity
unbind = SUPER SHIFT CTRL, $a # Unsure where the need for this is coming from
#
unbind = SUPER SHIFT, A
unbind = SUPER SHIFT, $a
bindd = SUPER SHIFT, A, Perplexity, exec, $launch-webapp "https://www.perplexity.ai/"

# Grok
unbind = SUPER CTRL, A
unbind = SUPER CTRL, $a
bindd = SUPER CTRL, A, Grok, exec, $launch-webapp "https://grok.com"

# ChatGPT
unbind = SUPER ALT, A
unbind = SUPER ALT, $a
bindd = SUPER ALT, A, ChatGPT, exec, $launch-webapp "https://chatgpt.com"

# Dictionary
workspace = special:Dictionary, on-created-empty:$launch-webapp "https://www.onelook.com/thesaurus/"
#
unbind = SUPER, I
unbind = SUPER, $i
bindd = SUPER, I, Dictionary, togglespecialworkspace, Dictionary

# GitHub
workspace = special:source-control, on-created-empty:$launch-webapp "https://github.com/"
#
unbind = SUPER, G
unbind = SUPER, $g
bindd = SUPER, G, GitHub, togglespecialworkspace, source-control
#
unbind = SUPER SHIFT CTRL, G
unbind = SUPER SHIFT CTRL, $g
bindd = SUPER SHIFT CTRL, G, Move to source-control scratchpad, movetoworkspace, special:source-control

# Calendar
workspace = special:Calendar, on-created-empty:$launch-webapp "https://calendar.proton.me"
#
unbind = SUPER, equal
unbind = SUPER, Equal
unbind = SUPER, EQUAL
unbind = SUPER, $equal
bindd = SUPER, Equal, Calendar Scratchpad, togglespecialworkspace, Calendar
#
unbind = SUPER SHIFT CTRL, equal
unbind = SUPER SHIFT CTRL, Equal
unbind = SUPER SHIFT CTRL, EQUAL
unbind = SUPER SHIFT CTRL, $equal
bindd = SUPER SHIFT CTRL, Equal, Open Calendar, exec, $launch-webapp "https://calendar.proton.me"

# Email
workspace = special:Email, on-created-empty:$launch-webapp "https://mail.proton.me"
#
unbind = SUPER SHIFT, E
unbind = SUPER SHIFT, $e
bindd = SUPER SHIFT, E, Email Scratchpad, togglespecialworkspace, Email
#
unbind = SUPER SHIFT CTRL, E
unbind = SUPER SHIFT CTRL, $e
bindd = SUPER SHIFT CTRL, E, Email, exec, $launch-webapp "https://mail.proton.me"

###                     ###
######### Webapps #########
###########################

###########################
##### Terminal & TUI ######
###                     ###


# Terminal New Window
unbind = SUPER SHIFT, T
unbind = SUPER SHIFT, $t
bindd = SUPER SHIFT, T, Terminal, exec, $terminal

# term1
workspace = special:term1, layout:master, layoutopt:mfact:0.34, layoutopt:orientation:center, on-created-empty:$terminal
#
unbind = SUPER, T
unbind = SUPER, $t
bindd = SUPER, T, Terminal Scratchpad 1, togglespecialworkspace, term1
#
unbind = SUPER SHIFT CTRL, T
unbind = SUPER SHIFT CTRL, $t
bindd = SUPER SHIFT CTRL, T, Move to term1's dropdown, movetoworkspace, special:term1

# term2
workspace = special:term2, layout:master, layoutopt:mfact:0.34, layoutopt:orientation:center, on-created-empty:$terminal
#
unbind = SUPER CTRL, T
unbind = SUPER CTRL, $t
bindd = SUPER CTRL, T, Terminal Scratchpad 2, togglespecialworkspace, term2

# Dotfiles
$dotsCmd = ghostty --working-directory="$HOME/repos/omarchy-overrides"
#workspace = special:Dotfiles, on-created-empty:uwsm app -- $dotsCmd
#
unbind = SUPER ALT, T
unbind = SUPER ALT, $t
#bindd = SUPER ALT, T, Dotfile Scratchpad, togglespecialworkspace, Dotfiles
bindd = SUPER ALT, T, Open Dotfiles Terminal, exec, $dotsCmd

# lazydocker
workspace = special:Lazydocker, on-created-empty:exec $terminal -e lazydocker
#
unbind = SUPER SHIFT, D
unbind = SUPER SHIFT, $d
bindd = SUPER SHIFT, D, Lazydocker, togglespecialworkspace, Lazydocker

# Gazelle-TUI WiFi Management
workspace = special:Gazelle-TUI, on-created-empty:exec $terminal -e gazelle
workspace = special:Gazelle-TUI, layout:master, orientation:center # Master layout by default
#
unbind = SUPER SHIFT, W
unbind = SUPER SHIFT, $w
bindd = SUPER SHIFT, W, Network Controls (gazelle-tui), togglespecialworkspace, Gazelle-TUI

# nmtui Network Management
workspace = special:nmtui, on-created-empty:exec $terminal -e nmtui
#
unbind = SUPER CTRL, W
unbind = SUPER CTRL, $w
bindd = SUPER CTRL, W, Network Controls (nmtui), togglespecialworkspace, nmtui

# Task Manager
workspace = special:btop, on-created-empty:$terminal -e btop
unbind = SUPER, P
unbind = SUPER, $p
bindd = SUPER, P, Task Manager, togglespecialworkspace, btop
#
unbind = SUPER ALT, P
unbind = SUPER ALT, $p
bindd = SUPER ALT, P, Task Manager, exec, $terminal -e btop

