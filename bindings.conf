###########################
####### Variables #########
###                     ###

binds {
  workspace_back_and_forth = false
  hide_special_on_workspace_change = true
}

ecosystem {
  no_donation_nag = true
}

###                     ###
####### Variables #########
###########################

###########################
##### Unbind Keycodes #####
###                     ###

# Unless explicitly listed here, most
# bindings are unbound in proximity to
# their new definitions (override).

# formerly switch workspace
# - Keycodes are not intuitive
unbind = SUPER, code:10
unbind = SUPER, code:11
unbind = SUPER, code:12
unbind = SUPER, code:13
unbind = SUPER, code:14
unbind = SUPER, code:15
unbind = SUPER, code:16
unbind = SUPER, code:17
unbind = SUPER, code:18
unbind = SUPER, code:19

# formerly move active window to workspace
# - Keycodes are not intuitive
unbind = SUPER SHIFT, code:10
unbind = SUPER SHIFT, code:11
unbind = SUPER SHIFT, code:12
unbind = SUPER SHIFT, code:13
unbind = SUPER SHIFT, code:14
unbind = SUPER SHIFT, code:15
unbind = SUPER SHIFT, code:16
unbind = SUPER SHIFT, code:17
unbind = SUPER SHIFT, code:18
unbind = SUPER SHIFT, code:19

###                     ###
##### Unbind Keycodes #####
###########################

###########################
######### System ##########
###                     ###

# Switch workspaces with SUPER + [0-9]
unbind = SUPER, 1
bindd = SUPER, 1, Switch to workspace 1, workspace, 1
#
unbind = SUPER, 2
bindd = SUPER, 2, Switch to workspace 2, workspace, 2
#
unbind = SUPER, 3
bindd = SUPER, 3, Switch to workspace 3, workspace, 3
#
unbind = SUPER, 4
bindd = SUPER, 4, Switch to workspace 4, workspace, 4
#
unbind = SUPER, 5
bindd = SUPER, 5, Switch to workspace 5, workspace, 5
#
unbind = SUPER, 6
bindd = SUPER, 6, Switch to workspace 6, workspace, 6
#
unbind = SUPER, 7
bindd = SUPER, 7, Switch to workspace 7, workspace, 7
#
unbind = SUPER, 8
bindd = SUPER, 8, Switch to workspace 8, workspace, 8
#
unbind = SUPER, 9
bindd = SUPER, 9, Switch to workspace 9, workspace, 9
#
unbind = SUPER, 0
bindd = SUPER, 0, Switch to workspace 10, workspace, 10

# Move active window to a workspace with SUPER + SHIFT + [0-9]
unbind = SUPER SHIFT, 1
bindd = SUPER SHIFT, 1, Move window to workspace 1, movetoworkspace, 1
#
unbind = SUPER SHIFT, 2
bindd = SUPER SHIFT, 2, Move window to workspace 2, movetoworkspace, 2
#
unbind = SUPER SHIFT, 3
bindd = SUPER SHIFT, 3, Move window to workspace 3, movetoworkspace, 3
#
unbind = SUPER SHIFT, 4
bindd = SUPER SHIFT, 4, Move window to workspace 4, movetoworkspace, 4
#
unbind = SUPER SHIFT, 5
bindd = SUPER SHIFT, 5, Move window to workspace 5, movetoworkspace, 5
#
unbind = SUPER SHIFT, 6
bindd = SUPER SHIFT, 6, Move window to workspace 6, movetoworkspace, 6
#
unbind = SUPER SHIFT, 7
bindd = SUPER SHIFT, 7, Move window to workspace 7, movetoworkspace, 7
#
unbind = SUPER SHIFT, 8
bindd = SUPER SHIFT, 8, Move window to workspace 8, movetoworkspace, 8
#
unbind = SUPER SHIFT, 9
bindd = SUPER SHIFT, 9, Move window to workspace 9, movetoworkspace, 9
#
unbind = SUPER SHIFT, 0
bindd = SUPER SHIFT, 0, Move window to workspace 10, movetoworkspace, 10

# Screenshots
# bindd = , PRINT, Screenshot of region, exec, omarchy-cmd-screenshot
unbind = SUPER, semicolon
unbind = SUPER, Semicolon
unbind = SUPER, SEMICOLON
bindd = SUPER, Semicolon, Screenshot of region to clipboard, exec, grim -g "$(slurp -w 0)" - | wl-copy # Take an area-select screenshot
# bindd = SUPER SHIFT CTRL, semicolon, Screenshot of region, exec, omarchy-cmd-screenshot
# bindd = SUPER SHIFT, semicolon, Screenshot of window, exec, omarchy-cmd-screenshot window
# bindd = SUPER CTRL, semicolon, Screenshot of display, exec, omarchy-cmd-screenshot output

# Screen recordings
unbind = SUPER ALT, semicolon
unbind = SUPER ALT, Semicolon
unbind = SUPER ALT, SEMICOLON
bindd = SUPER ALT, Semicolon, Screen Record, exec, omarchy-menu screenrecord
#bindd = SUPER CTRL ALT, semicolon, Screen record a region with audio, exec, omarchy-cmd-screenrecord region audio
#bindd = SUPER SHIFT ALT, semicolon, Screen record display, exec, omarchy-cmd-screenrecord output
#bindd = SUPER SHIFT CTRL ALT, semicolon, Screen record display with audio, exec, omarchy-cmd-screenrecord output audio

### Voxtype Speech-to-Text binds
# unbind = SUPER CTRL, X # default STT binding
unbind = SUPER, D
bindd  = SUPER, D, Start dictation (hold), exec, voxtype record start
binddr = SUPER, D, Stop dictation (release), exec, voxtype record stop

# Color picker
unbind = SUPER SHIFT CTRL ALT, P
bindd = SUPER SHIFT CTRL ALT, P, Color picker, exec, pkill hyprpicker || hyprpicker -a

# emoji picker
# unbind = SUPER, R
# bindd = SUPER, R, Emoji picker, exec, walker -m Emojis

# omarchy menu
unbind = SUPER, space
unbind = SUPER, Space
unbind = SUPER, SPACE
bindd = SUPER, Space, Omarchy menu, exec, omarchy-menu

# show keybind preview
unbind = SUPER SHIFT CTRL ALT, K
bindd = SUPER SHIFT CTRL ALT, K, Show key bindings, exec, omarchy-menu-keybindings

# Notification dismissal / toggle
unbind = SUPER, X
bindd = SUPER, X, Dismiss last notification, exec, makoctl dismiss
#
unbind = SUPER SHIFT, X
bindd = SUPER SHIFT, X, Dismiss all notifications, exec, makoctl dismiss --all
#
unbind = SUPER CTRL, X
bindd = SUPER CTRL, X, Toggle silencing notifications, exec, makoctl mode -t do-not-disturb && makoctl mode | grep -q 'do-not-disturb' && notify-send "Silenced notifications" || notify-send "Enabled notifications"

# move focus between windows
unbind = SUPER, H
bindd = SUPER, H, Move focus up, movefocus, l
#
unbind = SUPER, L
bindd = SUPER, L, Move focus up, movefocus, r
#
unbind = SUPER, J
bindd = SUPER, J, Move focus up, movefocus, d
#
unbind = SUPER, K
bindd = SUPER, K, Move focus up, movefocus, u

# Swap active window with the one next to it with SUPER + SHIFT + H/J/K/L
unbind = SUPER SHIFT, H
bindd = SUPER SHIFT, H, Swap window to the left, swapwindow, l
#
unbind = SUPER SHIFT, L
bindd = SUPER SHIFT, L, Swap window to the right, swapwindow, r
#
unbind = SUPER SHIFT, J
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d
#
unbind = SUPER SHIFT, K
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u

# Move active window (directionally, without "swapping," even to another workspace)
# (floating windows move to edge of screen)
unbind = SUPER SHIFT CTRL, H
bindd = SUPER SHIFT CTRL, H, Move window to the left, movewindow, l
#
unbind = SUPER SHIFT CTRL, L
bindd = SUPER SHIFT CTRL, L, Move window to the right, movewindow, r
#
unbind = SUPER SHIFT CTRL, J
bindd = SUPER SHIFT CTRL, J, Move window down, movewindow, d
#
unbind = SUPER SHIFT CTRL, K
bindd = SUPER SHIFT CTRL, K, Move window up, movewindow, u

# "Nudge" for repositioning floating windows
$nudgefact = 20
#
unbind = SUPER SHIFT ALT, H
bindd = SUPER SHIFT ALT, H, Nudge window to the left (floating windows), moveactive, -$nudgefact 0
#
unbind = SUPER SHIFT ALT, L
bindd = SUPER SHIFT ALT, L, Nudge window to the right (floating windows), moveactive, $nudgefact 0
#
unbind = SUPER SHIFT ALT, J
bindd = SUPER SHIFT ALT, J, Nudge window down (floating windows), moveactive, 0 -$nudgefact
#
unbind = SUPER SHIFT ALT, K
bindd = SUPER SHIFT ALT, K, Nudge window up (floating windows), moveactive, 0 $nudgefact

### Resize active window
# 
# Currently using a scripted solution for dynamic calculation
# of EXACT pixel values. For some reason hyprland's screensize-percentage
# isn't working as I'd like.
#
$delta = /home/t/.config/hypr/scripts/delta-resize.sh
#
unbind = SUPER CTRL, H
bindd = SUPER CTRL, H, Expand window horizontal, exec, $delta -x
#
unbind = SUPER CTRL, L
bindd = SUPER CTRL, L, Shrink window horizontal, exec, $delta x
#
unbind = SUPER CTRL, J
bindd = SUPER CTRL, J, Expand window vertical, exec, $delta y
#
unbind = SUPER CTRL, K
bindd = SUPER CTRL, K, Shrink window vertical, exec, $delta -y


# app-launcher
unbind = SUPER, return
unbind = SUPER, Return
unbind = SUPER, RETURN
bindd = SUPER, Return, Launch apps, exec, walker -p "Start…"

# close active window
unbind = SUPER, Q
bindd = SUPER, Q, Close active window, killactive,

# fullscreen states
unbind = SUPER, F
bindd = SUPER, F, Maximize active window, fullscreenstate, 1, -1
#
unbind = SUPER SHIFT, F
bindd = SUPER SHIFT, F, Window fullscreen (client unaware), fullscreenstate, 2, 0
#
unbind = SUPER CTRL, F
bindd = SUPER CTRL, F, In-client fullscreen (window unaware), fullscreenstate, 0, 2
#
unbind = SUPER ALT, F
bindd = SUPER ALT, F, Typical fullscreen, fullscreenstate, 3, 3
#
unbind = SUPER SHIFT CTRL, F
bindd = SUPER SHIFT CTRL, F, Default window state, fullscreenstate, 0, 0

# Toggle floating on active window
unbind = SUPER SHIFT CTRL ALT, F
bindd = SUPER SHIFT CTRL ALT, F, Toggle floating on active window, togglefloating

# Taggle game mode
unbind = SUPER SHIFT CTRL ALT, G
bindd = SUPER SHIFT CTRL ALT, G, Toggle game mode, exec, ~/.config/hypr/scripts/hyprgamemode.sh

# File Manager
unbind = SUPER, E
bindd = SUPER, E, File manager, exec, uwsm app -- nautilus --new-window

# Task Manager
unbind = SUPER, P
bindd = SUPER, P, Processes/Task Manager (btop), exec, $terminal -e btop

# Browsers
$browser = omarchy-launch-browser
#
# Firefox
$profile0 = Personal
$profile1 = Work
$profile2 = WebApps
#
unbind = SUPER, B
bindd = SUPER, B, Firefox - $profile0, exec, firefox -p $profile0
#
unbind = SUPER SHIFT, B
bindd = SUPER SHIFT, B, Firefox - $profile1, exec, firefox -p $profile1
#
unbind = SUPER CTRL, B
bindd = SUPER CTRL, B, Zen Browser, exec, zen-browser
#
unbind = SUPER ALT, B
bindd = SUPER ALT, B, $browser, exec, $browser

###                     ###
######### System ##########
###########################

###########################
#### Empty Scratchpads ####
###                     ###

# Scratchpad-1
workspace = special:Scratchpad-1
#
unbind = SUPER, period
unbind = SUPER, Period
unbind = SUPER, PERIOD
bindd = SUPER, Period, Scratchpad-1, togglespecialworkspace, Scratchpad-1
#
unbind = SUPER SHIFT CTRL, period
unbind = SUPER SHIFT CTRL, Period
unbind = SUPER SHIFT CTRL, PERIOD
bindd = SUPER SHIFT CTRL, Period, Move to Scratchpad-1, movetoworkspace, special:Scratchpad-1

# Scratchpad-2
workspace = special:Scratchpad-2
#
unbind = SUPER, U
bindd = SUPER, U, Scratchpad-2, togglespecialworkspace, Scratchpad-2
#
unbind = SUPER SHIFT CTRL, U
bindd = SUPER SHIFT CTRL, U, Move to Scratchpad-2, movetoworkspace, special:Scratchpad-2

# Scratchpad-3
workspace = special:Scratchpad-3
#
unbind = SUPER, Y
bindd = SUPER, Y, Scratchpad-3, togglespecialworkspace, Scratchpad-3
#
unbind = SUPER SHIFT CTRL, Y
bindd = SUPER SHIFT CTRL, Y, Move to Scratchpad-3, movetoworkspace, special:Scratchpad-3

###                     ###
#### Empty Scratchpads ####
###########################

###########################
######## Misc Apps ########
###                     ###

# Special Workspaces - Application Scratchpads
# on-created-empty -> launch app based on workspace rule

# Signal
$signalCmd = uwsm app -- signal-desktop
workspace = special:Signal, on-created-empty:$signalCmd
#
unbind = SUPER, comma
unbind = SUPER, Comma
unbind = SUPER, COMMA
bindd = SUPER, Comma, Signal, togglespecialworkspace, Signal
#
unbind = SUPER SHIFT CTRL, comma
unbind = SUPER SHIFT CTRL, Comma
unbind = SUPER SHIFT CTRL, COMMA
bindd = SUPER SHIFT CTRL, Comma, Move to Signal Scratchpad, movetoworkspace, special:Signal

# Discord
$discordCmd = uwsm app -- discord
workspace = special:Discord, on-created-empty:$discordCmd
#
unbind = SUPER, slash
unbind = SUPER, Slash
unbind = SUPER, SLASH
bindd = SUPER, Slash, Discord, togglespecialworkspace, Discord
unbind = SUPER SHIFT CTRL, slash
bindd = SUPER SHIFT CTRL, slash, Move to Discord Scratchpad, movetoworkspace, special:Discord

# Notes (Obsidian)
$notesCmd = uwsm app -- obsidian -disable-gpu
workspace = special:Notes, on-created-empty:$notesCmd
#
unbind = SUPER, O
bindd = SUPER, O, Notes, togglespecialworkspace, Notes
#
unbind = SUPER SHIFT CTRL, O
bindd = SUPER SHIFT CTRL, O, Move to Notes Scratchpad, movetoworkspace, special:Notes

# Obsidian new window
unbind = SUPER SHIFT, O
bindd = SUPER SHIFT, O, Obsidian, exec, uwsm app -- obsidian -disable-gpu

# Music (grayjay flatpak)
$grayjayCmd = uwsm app -- flatpak run app.grayjay.Grayjay
workspace = special:Grayjay, on-created-empty:$grayjayCmd
#
unbind = SUPER, M
bindd = SUPER, M, Grayjay Scratchpad, togglespecialworkspace, Grayjay
#
unbind = SUPER SHIFT, M
bindd = SUPER SHIFT, M, Grayjay, exec, $grayjayCmd
#
unbind = SUPER SHIFT CTRL, M
bindd = SUPER SHIFT CTRL, M, Move to Grayjay Scratchpad, movetoworkspace, special:Grayjay

# VPN
$vpnCmd = uwsm app -- protonvpn-app
workspace = special:VPN, on-created-empty:$vpnCmd
#
unbind = SUPER CTRL, P
bindd = SUPER CTRL, P, VPN, togglespecialworkspace, VPN

# Bitwarden
$pwmCmd = uwsm app -- bitwarden-desktop
workspace = special:Password-Manager, on-created-empty:$pwmCmd
#
unbind = SUPER SHIFT, P
bindd = SUPER SHIFT, P, Password Manager, togglespecialworkspace, Password-Manager

# Cryptomator
$cryptomatorCmd = uwsm app -- flatpak run org.cryptomator.Cryptomator
workspace = special:Cryptomator, on-created-empty:$cryptomatorCmd
#
unbind = SUPER ALT, P
bindd = SUPER ALT, P, Cryptomator, togglespecialworkspace, Cryptomator

