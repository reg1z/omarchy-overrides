###########################
######### Webapps #########
###                     ###

$launch-webapp = omarchy-launch-webapp
$launch-or-focus-webapp = omarchy-launch-or-focus-webapp

# Claude
$claudeCmd = $launch-webapp "https://claude.ai"
workspace = special:LLM, on-created-empty:$claudeCmd
workspace = special:LLM, layout:master, orientation:center # Master layout by default
#
unbind = SUPER, A
bindd = SUPER, A, LLM, togglespecialworkspace, LLM

# Perplexity
unbind = SUPER SHIFT CTRL, A  # for some reason the old perplexity binding is still showing in walker. This forces removal.
#                             # Is it defined elsewhere?
unbind = SUPER SHIFT, A
bindd = SUPER SHIFT, A, Perplexity, exec, $launch-webapp "https://www.perplexity.ai/"

# Grok
unbind = SUPER CTRL, A
bindd = SUPER CTRL, A, Grok, exec, $launch-webapp "https://grok.com"

# ChatGPT
unbind = SUPER ALT, A
bindd = SUPER ALT, A, ChatGPT, exec, $launch-webapp "https://chatgpt.com"

# Dictionary
workspace = special:Dictionary, on-created-empty:$launch-webapp "https://www.onelook.com/thesaurus/"
#
unbind = SUPER, I
bindd = SUPER, I, Dictionary, togglespecialworkspace, Dictionary

# GitHub
workspace = special:source-control, on-created-empty:$launch-webapp "https://github.com/"
#
unbind = SUPER, G
bindd = SUPER, G, GitHub, togglespecialworkspace, source-control
#
unbind = SUPER SHIFT CTRL, G
bindd = SUPER SHIFT CTRL, G, Move to source-control scratchpad, movetoworkspace, special:source-control

# Calendar
workspace = special:Calendar, on-created-empty:$launch-webapp "https://calendar.proton.me"
#
unbind = SUPER, equal
unbind = SUPER, Equal
unbind = SUPER, EQUAL
bindd = SUPER, Equal, Calendar Scratchpad, togglespecialworkspace, Calendar
#
unbind = SUPER SHIFT CTRL, equal
unbind = SUPER SHIFT CTRL, Equal
unbind = SUPER SHIFT CTRL, EQUAL
bindd = SUPER SHIFT CTRL, Equal, Open Calendar, exec, $launch-webapp "https://calendar.proton.me"

# Email
workspace = special:Email, on-created-empty:$launch-webapp "https://mail.proton.me"
#
unbind = SUPER SHIFT, E
bindd = SUPER SHIFT, E, Email Scratchpad, togglespecialworkspace, Email
#
unbind = SUPER SHIFT CTRL, E
bindd = SUPER SHIFT CTRL, E, Email, exec, $launch-webapp "https://mail.proton.me"

