###########################
##### Terminal & TUI ######
###                     ###

# Default Terminal Cmd
$terminal = uwsm app -- xdg-terminal-exec

# Terminal New Window
unbind = SUPER SHIFT, T
bindd = SUPER SHIFT, T, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"

# term1
workspace = special:term1, on-created-empty:$terminal
#
unbind = SUPER, T
bindd = SUPER, T, Terminal Scratchpad 1, togglespecialworkspace, term1
#
unbind = SUPER SHIFT CTRL, T
bindd = SUPER SHIFT CTRL, T, Move to term1's dropdown, movetoworkspace, special:term1

# term2
workspace = special:term2, on-created-empty:$terminal
#
unbind = SUPER CTRL, T
bindd = SUPER CTRL, T, Terminal Scratchpad 2, togglespecialworkspace, term2

# term3
workspace = special:term3, on-created-empty:$terminal
#
unbind = SUPER ALT, T
bindd = SUPER ALT, T, Terminal Scratchpad 3, togglespecialworkspace, term3

# lazydocker
workspace = special:Lazydocker, on-created-empty:exec $terminal -e lazydocker
#
unbind = SUPER SHIFT, D
bindd = SUPER SHIFT, D, Lazydocker, togglespecialworkspace, Lazydocker

# Gazelle-TUI WiFi Management
workspace = special:Gazelle-TUI, on-created-empty:exec $terminal -e gazelle
workspace = special:Gazelle-TUI, layout:master, orientation:center # Master layout by default
#
unbind = SUPER SHIFT, W
bindd = SUPER SHIFT, W, Network Controls (gazelle-tui), togglespecialworkspace, Gazelle-TUI

# nmtui Network Management
workspace = special:nmtui, on-created-empty:exec $terminal -e nmtui
#
unbind = SUPER CTRL, W
bindd = SUPER CTRL, W, Network Controls (nmtui), togglespecialworkspace, nmtui

