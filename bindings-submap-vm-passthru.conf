# Submap notifications
$SUBMAP_NOTIFY_PASSTHRU = notify-send "Enabled VM Passthrough" ""
$SUBMAP_NOTIFY_DEFAULT = notify-send "Disabled VM Passthrough" ""

## Passthrough SUPER KEY to Virtual Machine ###
unbind = SUPER, DELETE
bindd = SUPER, DELETE, Virtual Machine SUPER Key Passthru, exec, hyprctl dispatch submap passthru; $SUBMAP_NOTIFY_PASSTHRU # Passthrough SUPER key to virtual machine

### passthru
submap = passthru
bindd =, DELETE, End VM Passthru, exec, hyprctl dispatch submap reset; $SUBMAP_NOTIFY_DEFAULT # Get SUPER key back from virtual machine
bindd = SUPER SHIFT CTRL ALT, K, Show key bindings, exec, omarchy-menu-keybindings
bindd = SUPER ALT, K, Show key bindings, exec, omarchy-menu-keybindings


submap = reset
